name: Python Tests

on:
  push:
    paths:
      - "mobguard_module/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "mobguard_module/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/python-tests.yml"

jobs:
  module-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run module tests
        run: pytest -q
